  aiprovider: LOCAL
  allowaioverride: true
  inboundcontext: to-ai

pjpeers:
  - name: Peer1
    host: 10.10.10.10
    authuser:
    authpass:
    aicontext:
    aiprovider:
    inboundcontext:
