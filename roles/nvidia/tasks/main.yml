---
- name: Install Nvidia packages
  apt:
    name:
      - ubuntu-drivers-common
      - alsa-utils
    state: present
  when: nvidiagpu is defined

- name: Running ubuntu-drivers install thing
  command:
   argv:
     - /usr/bin/ubuntu-drivers
     - install
   creates: /usr/bin/nvidia-smi
  when: nvidiagpu is defined

- name: Check if nvidia-smi works (If this fails, reboot)
  command:
   argv:
     - /usr/bin/nvidia-smi
  register: smiout
  changed_when: false
  when: nvidiagpu is defined

# Generated by curl -fsSL https://nvidia.github.io/libnvidia-container/gpgkey | gpg --dearmor -o nvidia-container-toolkit-keyring.gpg

- name: Add repo key
  copy:
    src: nvidia-container-toolkit-keyring.gpg
    dest: /usr/share/keyrings/nvidia-container-toolkit-keyring.gpg
  when: nvidiagpu is defined

# Generated by
# curl -s -L https://nvidia.github.io/libnvidia-container/stable/deb/nvidia-container-toolkit.list |
#    sed 's#deb https://#deb [signed-by=/usr/share/keyrings/nvidia-container-toolkit-keyring.gpg] https://#g' > nvidia-container-toolkit.list
- name: Add repo
  copy:
    src: nvidia-container-toolkit.list
    dest: /etc/apt/sources.list.d/nvidia-container-toolkit.list
  when: nvidiagpu is defined
  register: repostuff

- name: apt-update
  apt:
    update_cache: true
  when: repostuff is defined and repostuff.changed

- set_fact:
    NVIDIA_CONTAINER_TOOLKIT_VERSION: 1.18.2-1
  when: nvidiagpu is defined

- name: Install toolkit
  apt:
    name:
      - nvidia-container-toolkit={{NVIDIA_CONTAINER_TOOLKIT_VERSION}}
      - nvidia-container-toolkit-base={{NVIDIA_CONTAINER_TOOLKIT_VERSION}}
      - libnvidia-container-tools={{NVIDIA_CONTAINER_TOOLKIT_VERSION}}
      - libnvidia-container1={{NVIDIA_CONTAINER_TOOLKIT_VERSION}}
    state: present
  register: toolinstall
  when: nvidiagpu is defined

- name: nvidia-ctk
  command:
    argv:
      - nvidia-ctk
      - runtime
      - configure
      - --runtime=docker
  when: toolinstall is defined and toolinstall.changed
  notify:
    - restart-docker
